# 从 Figma 拉取最新图标 → 跑构建 → 如有变动推送日期分支
#
# 触发：
#   - 手动: Actions → "sync from figma" → Run workflow
#   - 定时: 每天 02:00 UTC（北京时间 10:00）
#
# 配置（一次性）：
#   Settings → Secrets and variables → Actions
#     - Secret: FIGMA_TOKEN      ← Figma personal access token
#     - Secret: FIGMA_FILE_KEY   ← Figma 文件 URL 里的 key
#     可选：
#     - Variable: FIGMA_NODE_ID  ← 指定扫描根 frame，如 "256:3152"。推荐用，能精确指向标准版本
#     - Variable: FIGMA_PAGE_NAME ← 没设 NODE_ID 时退回按 page 名扫，默认 "Icons"
#
# 行为：
#   - 拉 SVG → public/raw-svg/
#   - 跑 icons:build 重新生成组件 + registry.json
#   - 跑 shadcn build 更新 public/r/*.json
#   - 有变动 → 推送 bot/sync-figma-日期 分支；无变动 → 跳过
#
# 默认带 --prune：Figma 删了的图标本地也删，防止僵尸文件
name: sync from figma

on:
  workflow_dispatch:
    inputs:
      prune:
        description: "删除 Figma 中已不存在的本地图标"
        type: boolean
        default: true
  schedule:
    # 每天 02:00 UTC（北京时间 10:00）
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Sync icons from Figma
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
          FIGMA_NODE_ID: ${{ vars.FIGMA_NODE_ID }}
          FIGMA_PAGE_NAME: ${{ vars.FIGMA_PAGE_NAME || 'Icons' }}
        run: |
          if [ "${{ inputs.prune }}" = "false" ]; then
            pnpm icons:sync
          else
            pnpm icons:sync --prune
          fi

      - name: Rebuild registry
        run: pnpm registry:build
        # 部署时 deploy.yml 会用真实 PAGES_URL 再跑一次，这里只是为了 PR diff 完整
        env:
          REGISTRY_BASE_URL: https://placeholder.invalid

      - name: Push dated branch if changed
        run: |
          changed_paths="$(
            git status --porcelain -- \
              public/raw-svg \
              registry \
              registry.json \
              components/icons \
              public/r
          )"

          if [ -z "$changed_paths" ]; then
            echo "No icon changes found."
            exit 0
          fi

          branch="bot/sync-figma-$(date -u +'%Y%m%d-%H%M%S')-${GITHUB_RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add -- \
            public/raw-svg \
            registry \
            registry.json \
            components/icons \
            public/r
          git commit -m "chore(icons): sync from figma"
          git push origin "HEAD:$branch"

          echo "Pushed branch: $branch"
          echo "Open PR: https://github.com/${GITHUB_REPOSITORY}/compare/main...${branch}?expand=1"
